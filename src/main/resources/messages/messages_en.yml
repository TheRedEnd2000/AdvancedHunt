    save_failed_collection: "%prefix%&cFailed to save collection preset!"
  
command:
  help:
    - "&6AdvancedHunt Help:"
    - "&e/ah help &7- Shows this help menu"
    - "&e/ah reload &7- Reloads the plugin"
    - "&e/ah list &7- Lists all available collections"
    - "&e/ah leaderboard <collection> &7- Opens leaderboard GUI"
