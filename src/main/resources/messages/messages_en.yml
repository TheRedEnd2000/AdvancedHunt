    hint: "&eUse /ah list <collection> to view treasures."
  collection_not_found: "%prefix%&cCollection not found."

  direction:
    east: "East"
    southeast: "Southeast"
    south: "South"
    southwest: "Southwest"
    west: "West"
    northwest: "Northwest"
    north: "North"
    northeast: "Northeast"
  rewards:
    no_block: "%prefix%&cYou must be looking at a block!"
    not_treasure: "%prefix%&cThat block is not a treasure!"
  rename:
    success: "%prefix%&aSuccessfully renamed collection &e%old_name% &ato &e%new_name%"
    failed: "%prefix%&cFailed to rename collection. Check if old exists and new name is unique."
  create:
    success: "%prefix%&aSuccessfully created collection &e%name%"
    failed: "%prefix%&cFailed to create collection. A collection with that name might already exist."
  place_mode:
    disabled: "%prefix%&aPlace mode disabled."
    enabled: "%prefix%&aPlace mode enabled for collection &e%collection%&a. Place blocks to add treasures."
    no_break: "%prefix%&cYou cannot break blocks in place mode!"
