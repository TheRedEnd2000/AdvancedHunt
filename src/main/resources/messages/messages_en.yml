    all_success: "%prefix%&aReset &e%count% &atreasure records for all players across all collections!"
    collection_success: "%prefix%&aReset &e%count% &atreasure records for collection &e%collection%&a!"
    player_success: "%prefix%&aReset &e%count% &atreasure records for player &e%player%&a!"
    player_collection_success: "%prefix%&aReset &e%count% &atreasure records for player &e%player% &ain collection &e%collection%&a!"
    player_not_found: "%prefix%&cPlayer not found or has never played on this server."
