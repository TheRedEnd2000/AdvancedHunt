# Ignore configuration for scripts/message_key_audit.py
#
# Entries can be:
# - exact keys (e.g. gui.foo.bar)
# - wildcard patterns using '*' (e.g. gui.foo.*.bar)
# - regex-like patterns (e.g. ^gui\.foo\..*$)
#
# This file is optional. The auditor auto-loads it when present.

# Top-level YAML metadata/version keys that are intentionally not referenced
# via MessageManager in code.
ignore_unused:
  - config-version
