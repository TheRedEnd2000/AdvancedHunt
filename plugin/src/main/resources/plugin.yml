name: AdvancedHunt
version: '4.0.0-SNAPSHOT'
main: de.theredend2000.advancedhunt.Main
api-version: '1.21'
authors: [ GrafterCrafter, TheRedEnd2000 ]
softdepend: [ ItemsAdder, packetevents ]

permissions:
  advancedhunt.help:
    description: Allows access to the help command
    default: true
  advancedhunt.list:
    description: Allows listing collections
    default: true
  advancedhunt.leaderboard:
    description: Allows viewing the leaderboard
    default: true
  advancedhunt.progress:
    description: Allows viewing collection progress
    default: true
  advancedhunt.collection.info:
    description: Allows viewing collection information and UUID
    default: op
  advancedhunt.hint:
    description: Allows requesting hints via minigame
    default: true
  advancedhunt.admin:
    description: Grants all administrative permissions
    default: op
    children:
      advancedhunt.admin.reload: true
      advancedhunt.admin.show: true
      advancedhunt.admin.collection.editor: true
      advancedhunt.admin.collection.rename: true
      advancedhunt.admin.collection.create: true
      advancedhunt.admin.place: true
      advancedhunt.admin.place_items: true
      advancedhunt.admin.reset: true
      advancedhunt.admin.teleport: true
      advancedhunt.admin.view_finders: true
      advancedhunt.admin.rewards: true
      advancedhunt.treasure.bypass: true
  advancedhunt.admin.show:
    description: Allows showing a temporary hologram via PacketEvents
    default: op
  advancedhunt.admin.rewards:
    description: Allows viewing and editing treasure rewards
    default: op
  advancedhunt.admin.reload:
    description: Allows reloading the plugin
    default: op
  advancedhunt.admin.collection.editor:
    description: Allows opening the collection editor
    default: op
  advancedhunt.admin.collection.rename:
    description: Allows renaming collections
    default: op
  advancedhunt.admin.collection.create:
    description: Allows creating collections
    default: op
  advancedhunt.admin.place:
    description: Allows entering place mode
    default: op
  advancedhunt.admin.place_items:
    description: Allows managing place items
    default: op
  advancedhunt.admin.reset:
    description: Allows resetting player data
    default: op
  advancedhunt.admin.teleport:
    description: Allows teleporting to treasures
    default: op
  advancedhunt.admin.view_finders:
    description: Allows viewing who found a treasure
    default: op
  advancedhunt.treasure.bypass:
    description: Allows toggling treasure visibility bypass
    default: op
